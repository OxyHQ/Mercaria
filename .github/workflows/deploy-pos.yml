name: Deploy POS

# Deploys the POS web bundle to a Cloudflare Worker (Static Assets) named
# `mercaria-pos`. `workers_dev`/`preview_urls` are disabled in wrangler.jsonc so
# the app is served ONLY via the custom domain `pos.mercaria.co` — no
# `*.workers.dev` / `*.pages.dev` URL is ever exposed.
# HANDOFF: the Oxy RP client id for the POS app must be registered and the repo
# variable `EXPO_PUBLIC_OXY_CLIENT_ID_POS` set to it for the SSO RP flow to work.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-pos.yml'
      - 'packages/pos/**'
      - 'packages/ui/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  deploy-pos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - name: Build POS (Expo web export)
        run: bun run build:pos
        timeout-minutes: 60
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          # Public, compile-time Expo env. EXPO_PUBLIC_OXY_CLIENT_ID_POS is the
          # registered Oxy RP client id for the POS app (handoff: register it and
          # set this repo variable before the SSO RP flow works); the API URL
          # points at the Mercaria backend.
          EXPO_PUBLIC_OXY_CLIENT_ID: ${{ vars.EXPO_PUBLIC_OXY_CLIENT_ID_POS }}
          EXPO_PUBLIC_OXY_API_URL: ${{ vars.EXPO_PUBLIC_OXY_API_URL || 'https://api.oxy.so' }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://api.mercaria.co' }}
      - name: Deploy to Cloudflare Workers
        working-directory: packages/pos
        run: bunx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

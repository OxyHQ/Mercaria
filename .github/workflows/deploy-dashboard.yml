name: Deploy Dashboard

# Deploys the dashboard web bundle to a Cloudflare Worker (Static Assets) named
# `mercaria-dashboard`. `workers_dev`/`preview_urls` are disabled in
# wrangler.jsonc so the app is served ONLY via the custom domain
# `dashboard.mercaria.co` — no `*.workers.dev` / `*.pages.dev` URL is ever exposed.
# HANDOFF: the Oxy RP client id for the dashboard must be registered and the repo
# variable `EXPO_PUBLIC_OXY_CLIENT_ID_DASHBOARD` set to it for the SSO RP flow.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-dashboard.yml'
      - 'packages/dashboard/**'
      - 'packages/ui/**'
      - 'packages/shared-types/**'
      - 'package.json'
      - 'bun.lock'

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - name: Build dashboard (Expo web export)
        run: bun run build:dashboard
        timeout-minutes: 60
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
          # Public, compile-time Expo env. EXPO_PUBLIC_OXY_CLIENT_ID_DASHBOARD is
          # the registered Oxy RP client id for the dashboard (handoff: register
          # it and set this repo variable before the SSO RP flow works); the API
          # URL points at the Mercaria backend.
          EXPO_PUBLIC_OXY_CLIENT_ID: ${{ vars.EXPO_PUBLIC_OXY_CLIENT_ID_DASHBOARD }}
          EXPO_PUBLIC_OXY_API_URL: ${{ vars.EXPO_PUBLIC_OXY_API_URL || 'https://api.oxy.so' }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://api.mercaria.co' }}
      - name: Deploy to Cloudflare Workers
        working-directory: packages/dashboard
        run: bunx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
